<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PayPal Mobile Test</title>
  <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD&intent=capture"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
    }
    #log {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      text-align: left;
      white-space: pre-wrap;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h2>PayPal Mobile Test</h2>
  <p>Testing a simple $5.00 checkout.</p>

  <div id="paypal-button-container"></div>

  <div id="log">Logs will appear here.</div>

  <script>
    function log(msg, obj) {
      const el = document.getElementById("log");
      let line = "[" + new Date().toLocaleTimeString() + "] " + msg;

      if (obj) {
        try {
          line += "\n" + JSON.stringify(obj, null, 2);
        } catch (e) {
          line += "\n" + String(obj);
        }
      }

      console.log(msg, obj || "");
      el.textContent = line + "\n\n" + el.textContent;
    }

    log("Page loaded");

    paypal.Buttons({
      onClick: function (data, actions) {
        log("onClick fired", data);
      },

      createOrder: function (data, actions) {
        log("createOrder started");

        return actions.order.create({
          purchase_units: [
            {
              amount: {
                value: "5.00"
              }
            }
          ]
        }).then(function (orderId) {
          log("createOrder success", { orderId: orderId });
          return orderId;
        }).catch(function (err) {
          log("createOrder failed", err);
          throw err;
        });
      },

      onApprove: function (data, actions) {
        log("onApprove fired", data);

        return actions.order.capture().then(function (details) {
          log("capture success", details);
          alert("Payment completed");
        }).catch(function (err) {
          log("capture failed", err);
          alert("Capture failed");
        });
      },

      onCancel: function (data) {
        log("onCancel fired", data);
        alert("Checkout cancelled");
      },

      onError: function (err) {
        log("onError fired", err);
        alert("Checkout error");
      }
    }).render("#paypal-button-container").then(function () {
      log("buttons rendered");
    }).catch(function (err) {
      log("render failed", err);
    });
  </script>
</body>
</html>
